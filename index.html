<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Florent Turri - Ingénieur logiciel, systèmes & prototypage hardware</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>
  <div id="app">

    <aside class="sidebar">

      <div class="top">

        <div class="identity">
          <div class="name">Florent Turri</div>
          <div class="role">Ingénieur logiciel systèmes & prototypage hardware</div>
        </div>

        <!-- SEARCH -->
        <input
          id="search"
          placeholder="Search..."
          oninput="setSearch(this.value)"
        />

        <!-- EXPERTISES -->
        <div class="section">
          <div class="section-title">Expertises</div>

          <div class="col">
	    <button data-mode="all" onclick="setMode('all')">General</button>
	    <button data-mode="dev" onclick="setMode('dev')">Deveveloppement logiciel</button>
	    <button data-mode="linux" onclick="setMode('linux')">Systèmes Linux</button>
	    <button data-mode="3d" onclick="setMode('3d')">Modélisation 3D</button>
          </div>
        </div>

        <!-- SECTIONS -->
        <div class="section">
	  <button onclick="setView('overview')" class="section-title">
	    SECTIONS
	  </button>

          <div class="col">
	    <button data-view="skills" onclick="setView('skills')">Compétences</button>
	    <button data-view="experiences" onclick="setView('experiences')">Expériences</button>	    
	    <button data-view="projects" onclick="setView('projects')">Projets</button>
          </div>

        </div>

      </div>

      <!-- FOOTER FIXED AREA -->
      <div class="bottom">
        <a class="cv" href="cv.pdf" download>📄 CV</a>
      </div>

    </aside>

    <main id="content"></main>

  </div>

  <script src="js/data.js"></script>
  <script src="js/render.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
