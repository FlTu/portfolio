<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Florent Turri — Systems Engineer</title>
<link rel="stylesheet" href="style.css"/>
</head>

<body>

<div class="layout">

<!-- ================= SIDEBAR ================= -->
<aside class="sidebar">

  <div class="title">Florent Turri</div>
  <div class="muted">System Engineer</div>

  <div class="section-title">Module d’intention</div>

  <div class="mode">
    <button id="btn-dev" class="mode-btn active" onclick="setMode('dev')">Dev</button>
    <button id="btn-linux" class="mode-btn" onclick="setMode('linux')">Linux</button>
    <button id="btn-3d" class="mode-btn" onclick="setMode('3d')">3D</button>
  </div>

  <div class="section-title">Compétences</div>

  <input id="search" placeholder="Rechercher..." oninput="renderSkills()" />

  <div id="skills"></div>

</aside>

<!-- ================= MAIN ================= -->
<main class="main">

  <section>
    <h2>Projets</h2>
    <div id="projects"></div>
  </section>

  <section>
    <h2>Expériences</h2>
    <div id="exp"></div>
  </section>

  <section>
    <h2>CV</h2>
    <button onclick="downloadCV()">Télécharger CV</button>
  </section>

</main>

</div>

<script>

/* ================= STATE ================= */

let mode = "dev";
const expanded = {}; // persistant

/* ================= DATA ================= */

const skills = [
  {name:"C", level:"Expert", cat:"langages"},
  {name:"C++", level:"Expert", cat:"langages"},
  {name:"Python", level:"Intermédiaire", cat:"langages"},
  {name:"Shell / Bash", level:"Expert", cat:"langages"},

  {name:"Qt", level:"Confirmé", cat:"frameworks"},
  {name:"Boost", level:"Confirmé", cat:"frameworks"},

  {name:"Linux", level:"Expert", cat:"env"},
  {name:"Windows", level:"Confirmé", cat:"env"},

  {name:"Linux embarqué", level:"Expert", cat:"systems"},
  {name:"FPGA", level:"Intermédiaire", cat:"systems"},

  {name:"Multithreading", level:"Confirmé", cat:"concepts"},
  {name:"IPC", level:"Confirmé", cat:"concepts"},
  {name:"Réseaux", level:"Confirmé", cat:"concepts"},

  {name:"Git", level:"Expert", cat:"tools"},
  {name:"Docker", level:"Confirmé", cat:"tools"},
  {name:"CMake", level:"Confirmé", cat:"tools"},

  {name:"FreeCAD", level:"Intermédiaire", cat:"hardware"}
];

const categories = [
  {id:"langages", label:"Langages"},
  {id:"frameworks", label:"Frameworks"},
  {id:"env", label:"Environnements"},
  {id:"systems", label:"Systèmes"},
  {id:"concepts", label:"Concepts"},
  {id:"tools", label:"Outils"},
  {id:"hardware", label:"Hardware"}
];

/* ================= MODE (FIX IMPORTANT) ================= */

function setMode(m){
  mode = m;

  // reset buttons proprement (SANS render global immédiat destructeur)
  document.querySelectorAll(".mode-btn").forEach(b=>{
    b.classList.remove("active");
  });

  document.getElementById("btn-" + m).classList.add("active");

  // render safe
  render();
}

/* ================= SEARCH ================= */

function query(){
  return document.getElementById("search").value.toLowerCase();
}

/* ================= SKILLS ================= */

function toggle(cat){
  expanded[cat] = !expanded[cat];
  renderSkills();
}

/* ================= RENDER SKILLS ================= */

function renderSkills(){

  const el = document.getElementById("skills");
  const q = query();

  let html = "";

  categories.forEach(cat => {

    const list = skills.filter(s =>
      s.cat === cat.id &&
      s.name.toLowerCase().includes(q)
    );

    const isOpen = expanded[cat.id];
    const visible = isOpen ? list : list.slice(0,3);

    html += `
      <div class="skill-block">

        <div class="skill-title">${cat.label}</div>

        ${visible.map(s => `
          <div class="skill">
            ${s.name}
            ${isOpen ? `<div class="muted">${s.level}</div>` : ""}
          </div>
        `).join("")}

        ${list.length > 3 ? `
          <button onclick="toggle('${cat.id}')">
            ${isOpen ? "Réduire" : "Voir plus"}
          </button>
        ` : ""}

      </div>
    `;
  });

  el.innerHTML = html;
}

/* ================= MAIN CONTENT ================= */

function renderProjects(){
  document.getElementById("projects").innerHTML = `
    <div class="card">Plateforme C++ distribuée</div>
    <div class="card">Infra Linux personnelle</div>
    <div class="card">Laptop modulaire (hardware + CAO)</div>
  `;
}

function renderExp(){
  document.getElementById("exp").innerHTML = `
    <div class="card">Ingénieur embarqué — Défense</div>
    <div class="card">Ingénieur C++ — Systèmes distribués</div>
    <div class="card">Fondateur — Hardware system</div>
  `;
}

/* ================= CV ================= */

function downloadCV(){
  const blob = new Blob([
`Florent Turri
Ingénieur système logiciel

Mode: ${mode}
`
  ], {type:"text/plain"});

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "cv_florent_turri.txt";
  a.click();
}

/* ================= GLOBAL RENDER ================= */

function render(){
  renderSkills();
  renderProjects();
  renderExp();
}

/* init */
render();

</script>

</body>
</html>
