<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Florent Turri — Systems Engineer</title>
<link rel="stylesheet" href="style.css"/>
</head>

<body>

<div class="layout">

<!-- ================= SIDEBAR ================= -->
<aside class="sidebar">

  <div class="title">Florent Turri</div>
  <div class="muted">Ingénieur logiciel embarqué</div>

  <div class="section-title">Mode</div>
  <div class="mode">
    <button id="btn-dev" class="mode-btn active" onclick="setMode('dev')">Dev</button>
    <button id="btn-linux" class="mode-btn" onclick="setMode('linux')">Linux</button>
    <button id="btn-3d" class="mode-btn" onclick="setMode('3d')">3D</button>
  </div>

  <div class="section-title">Navigation</div>

  <button onclick="selectView('skills')">Compétences</button>

  <div class="section-title" onclick="toggleSection('exp-all')">
    Expériences (toggle)
  </div>

  <button onclick="selectView('exp-defense')">Défense</button>
  <button onclick="selectView('exp-data')">Plateforme distribuée</button>
  <button onclick="selectView('exp-fondateur')">Fondateur hardware</button>

  <div class="section-title" onclick="toggleSection('proj-all')">
    Projets (toggle)
  </div>

  <button onclick="selectView('proj-laptop')">Laptop modulaire</button>
  <button onclick="selectView('proj-platform')">Plateforme C++</button>
  <button onclick="selectView('proj-linux')">Infra Linux</button>

  <div class="section-title">CV</div>
  <button onclick="downloadCV()">Télécharger CV</button>

</aside>

<!-- ================= MAIN ================= -->
<main class="main">

  <div id="content"></div>

</main>

</div>

<script>

/* ================= STATE ================= */

let mode = "dev";
let view = "skills";

let showAllExp = false;
let showAllProj = false;

const expanded = {};

/* ================= DATA ================= */

const skills = [
  {name:"C", level:"Expert", cat:"langages"},
  {name:"C++", level:"Expert", cat:"langages"},
  {name:"Python", level:"Intermédiaire", cat:"langages"},
  {name:"Shell / Bash", level:"Expert", cat:"langages"},

  {name:"Qt", level:"Confirmé", cat:"frameworks"},
  {name:"Boost", level:"Confirmé", cat:"frameworks"},

  {name:"Linux", level:"Expert", cat:"env"},
  {name:"Windows", level:"Confirmé", cat:"env"},

  {name:"Linux embarqué", level:"Expert", cat:"systems"},
  {name:"FPGA", level:"Intermédiaire", cat:"systems"},

  {name:"Multithreading", level:"Confirmé", cat:"concepts"},
  {name:"IPC", level:"Confirmé", cat:"concepts"},
  {name:"Réseaux", level:"Confirmé", cat:"concepts"},

  {name:"Git", level:"Expert", cat:"tools"},
  {name:"Docker", level:"Confirmé", cat:"tools"},
  {name:"CMake", level:"Confirmé", cat:"tools"},

  {name:"FreeCAD", level:"Intermédiaire", cat:"hardware"},
  {name:"Prusa XL", level:"Intermédiaire", cat:"hardware"}
];

/* ================= MODE ================= */

function setMode(m){
  mode = m;

  document.querySelectorAll(".mode-btn").forEach(b=>{
    b.classList.remove("active");
  });

  document.getElementById("btn-"+m).classList.add("active");

  render();
}

/* ================= NAV ================= */

function selectView(v){
  view = v;
  render();
}

/* toggle sections (exp/proj global) */
function toggleSection(type){
  if(type === "exp-all") showAllExp = !showAllExp;
  if(type === "proj-all") showAllProj = !showAllProj;
  render();
}

/* ================= SKILLS ================= */

function toggle(cat){
  expanded[cat] = !expanded[cat];
  render();
}

/* ================= FILTER ================= */

function filterSkills(list){
  if(mode === "linux"){
    return list.filter(s => ["linux","tools","env"].includes(s.cat));
  }
  if(mode === "3d"){
    return list.filter(s => ["hardware","systems"].includes(s.cat));
  }
  return list;
}

/* ================= SKILLS RENDER ================= */

function renderSkills(){

  let html = "";

  const categories = [...new Set(skills.map(s=>s.cat))];

  categories.forEach(cat => {

    let list = skills.filter(s => s.cat === cat);
    list = filterSkills(list);

    if(list.length === 0) return;

    const isOpen = expanded[cat];
    const visible = isOpen ? list : list.slice(0,3);

    html += `
      <div class="skill-block">
        <div class="skill-title">${cat}</div>

        ${visible.map(s => `
          <div class="skill">
            ${s.name}
            ${isOpen ? `<div class="muted">${s.level}</div>` : ""}
          </div>
        `).join("")}

        ${list.length > 3 ? `
          <button onclick="toggle('${cat}')">
            ${isOpen ? "Réduire" : "Voir plus"}
          </button>
        ` : ""}
      </div>
    `;
  });

  return html;
}

/* ================= EXP / PROJ LIST STYLE ================= */

function renderExpList(){

  const items = [
    {
      id:"defense",
      title:"Ingénieur embarqué — Défense",
      desc:"C/C++ critique, Linux embarqué, optimisation, debug bas niveau."
    },
    {
      id:"data",
      title:"Plateforme distribuée C++",
      desc:"Réplication temps réel, SQLite, migration Linux, IBM i."
    },
    {
      id:"founder",
      title:"Fondateur — Hardware system",
      desc:"Laptop modulaire, CAO FreeCAD, impression 3D Prusa XL."
    }
  ];

  const list = showAllExp ? items : [];

  return `
    <h2>Expériences</h2>

    <button onclick="showAllExp = !showAllExp; render()"> 
      ${showAllExp ? "Réduire" : "Afficher tout"}
    </button>

    ${list.map(i=>`
      <div class="card" onclick="selectView('exp-'+i.id)">
        <strong>${i.title}</strong>
        <div class="muted">${i.desc}</div>
      </div>
    `).join("")}
  `;
}

function renderProjList(){

  const items = [
    {
      id:"laptop",
      title:"Laptop modulaire",
      desc:"Architecture hardware + software complète"
    },
    {
      id:"platform",
      title:"Plateforme C++",
      desc:"Systèmes distribués"
    },
    {
      id:"linux",
      title:"Infrastructure Linux",
      desc:"Docker, automation, self-hosting"
    }
  ];

  const list = showAllProj ? items : [];

  return `
    <h2>Projets</h2>

    <button onclick="showAllProj = !showAllProj; render()">
      ${showAllProj ? "Réduire" : "Afficher tout"}
    </button>

    ${list.map(i=>`
      <div class="card" onclick="selectView('proj-'+i.id)">
        <strong>${i.title}</strong>
        <div class="muted">${i.desc}</div>
      </div>
    `).join("")}
  `;
}

/* ================= CONTENT ================= */

function renderContent(){

  if(view === "skills"){
    return `
      <h2>Compétences</h2>
      ${renderSkills()}
    `;
  }

  if(view.startsWith("exp-") && view !== "skills"){

    const map = {
      "exp-defense": {
        title:"Ingénieur embarqué — Défense",
        text:"C/C++ critique, Linux embarqué, debug bas niveau, optimisation performance."
      },
      "exp-data": {
        title:"Plateforme distribuée C++",
        text:"Réplication temps réel, SQLite, migration Linux, IBM i."
      },
      "exp-founder": {
        title:"Fondateur — Hardware system",
        text:"Laptop modulaire, CAO FreeCAD, impression 3D Prusa XL."
      }
    };

    const e = map[view];

    return `
      <h2>${e.title}</h2>
      <p>${e.text}</p>
    `;
  }

  if(view.startsWith("proj-")){

    const map = {
      "proj-laptop": "Laptop modulaire — architecture hardware + software",
      "proj-platform": "Plateforme C++ distribuée",
      "proj-linux": "Infrastructure Linux personnelle"
    };

    return `
      <h2>Projet</h2>
      <p>${map[view]}</p>
    `;
  }

  return "";
}

/* ================= CV ================= */

function downloadCV(){
  const blob = new Blob([
`Florent Turri
CV
Mode: ${mode}`
  ], {type:"text/plain"});

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "cv_florent_turri.txt";
  a.click();
}

/* ================= RENDER ================= */

function render(){

  const content = renderContent();

  document.getElementById("content").innerHTML = `
    ${content}
  `;

  // inject exp/proj lists only in root view if needed
  if(view === "skills"){
    document.getElementById("content").innerHTML = `
      ${content}
      ${renderExpList()}
      ${renderProjList()}
    `;
  }
}

render();

</script>

</body>
</html>
